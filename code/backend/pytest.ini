[pytest]
DJANGO_SETTINGS_MODULE = quantyield.settings
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*
# pythonpath adds code/backend to sys.path so all imports resolve
# (requires pytest >= 7.0 and pytest-django >= 4.5)
pythonpath = .
testpaths = tests
addopts =
    --tb=short
    -v
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
