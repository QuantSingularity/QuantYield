[pytest]
# Root-level pytest.ini so that running `pytest` from the project root
# (QuantYield/) works just as well as running it from code/backend/.
DJANGO_SETTINGS_MODULE = quantyield.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Add the backend directory to sys.path so all imports resolve.
pythonpath = code/backend
testpaths = code/backend/tests
addopts =
    --tb=short
    -v
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
